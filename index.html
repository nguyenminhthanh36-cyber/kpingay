<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard KPI theo ngày — Boxme</title>
<style>
  :root{
    --bg:#fdeef4; --panel:#ffffff; --panel2:#fbe3ec; --border:#f0cddb;
    --text:#16181d; --muted:#7a6b73; --accent:#1d5fe0; --accent-light:#e4edff;
    --green:#178a4c; --red:#d64545; --amber:#b8790a;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  header{position:sticky;top:0;z-index:20;background:#ffffffee;backdrop-filter:blur(6px);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:16px;justify-content:space-between;}
  header h1{font-size:18px;margin:0;font-weight:700;color:var(--text);}
  header .meta{font-size:12px;color:var(--muted);}
  select, input[type=text]{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;outline:none;}
  select:focus, input[type=text]:focus{border-color:var(--accent);}
  main{padding:24px;max-width:1280px;margin:0 auto;}
  .toolbar-top{display:flex;gap:10px;margin-bottom:20px;}
  .toolbar-top input{flex:1;max-width:340px;}

  .tabs{display:flex;gap:6px;border-bottom:2px solid var(--border);margin-bottom:24px;flex-wrap:wrap;position:sticky;top:73px;background:var(--bg);z-index:15;padding-top:4px;}
  .tab-btn{appearance:none;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:600;padding:10px 18px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;border-radius:8px 8px 0 0;transition:color .15s,background .15s;}
  .tab-btn:hover{color:var(--text);background:var(--panel2);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-light);}
  .tab-btn .tab-count{font-weight:400;color:var(--muted);font-size:12px;margin-left:4px;}
  .tab-btn.active .tab-count{color:var(--accent);}

  .dept-section{display:none;}
  .dept-section.active{display:block;}
  .dept-header-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding-bottom:10px;border-bottom:2px solid var(--border);margin-bottom:4px;}
  .dept-title{display:flex;align-items:baseline;gap:10px;font-size:20px;font-weight:800;color:var(--text);}
  .dept-title .dept-count{font-size:12px;font-weight:400;color:var(--muted);}
  .type-filter{display:flex;gap:4px;background:var(--panel2);padding:4px;border-radius:9px;}
  .type-filter button{appearance:none;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;}
  .type-filter button.active{background:var(--panel);color:var(--accent);box-shadow:0 1px 2px rgba(20,30,60,.08);}
  .subsection{margin-top:18px;}
  .kpi-multi-row{display:flex;flex-wrap:nowrap;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:6px;}
  .kpi-multi-row .panel{margin-bottom:0;}
  .subsection h3{font-size:13px;margin:0 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
  .subsection h3 .type-badge{margin-left:6px;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 2px rgba(20,30,60,.04);width:fit-content;max-width:100%;}
  .table-scroll{overflow-x:auto;}
  table{width:auto;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 14px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text);}
  th:first-child,td:first-child{text-align:left;}
  th.stt-col,td.stt-col{text-align:center!important;width:36px;color:var(--muted);font-weight:600;}
  th{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.03em;background:var(--panel2);position:sticky;top:0;}
  th.ref-col{color:#a68a95;font-weight:500;font-style:italic;}
  td.ref-col{color:#a68a95;}
  th.total-col,td.total-col{color:var(--accent);font-weight:700;}
  tbody tr:hover{background:var(--panel2);}
  tfoot td{font-weight:700;background:var(--panel2);border-top:2px solid var(--border);border-bottom:none;color:var(--text);}
  tfoot td.total-col{color:var(--accent);}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge.ct{background:#e2eeff;color:#1d5fe0;}
  .badge.tv{background:#fdecd2;color:#b8790a;}
  .name-cell{font-weight:600;text-align:left;color:var(--text);}
  .email-cell{color:var(--muted);font-size:11px;text-align:left;font-weight:400;}
  .pagination{display:flex;gap:6px;padding:10px 14px;justify-content:flex-end;align-items:center;background:var(--panel);flex-wrap:wrap;}
  .pg-btn{border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;min-width:30px;}
  .pg-btn:hover:not(:disabled){background:var(--panel2);color:var(--text);}
  .pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .pg-btn:disabled{opacity:.35;cursor:not-allowed;}
  footer{padding:24px;text-align:center;color:var(--muted);font-size:12px;}
  .empty{padding:20px;text-align:center;color:var(--muted);font-size:13px;}
</style>
</head>

    let PAGE_STATE = {};

    function fmtNum(n){
      if (n === null || n === undefined) return '—';
      return Math.round(n).toLocaleString('vi-VN');
    }
    function esc(s){
      return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // Lấy danh sách nhân viên của 1 bộ phận (gộp RAW_EMPLOYEES + HO_EMPS)
    function getDeptEmployees(deptKey){
      const list = RAW_EMPLOYEES[currentMonth].filter(e => e.pos === deptKey);
      const ho = HO_EMPS[currentMonth].filter(e => e.pos === deptKey);

    // Sắp xếp: theo thứ tự tuỳ chỉnh (nếu có) hoặc theo tổng điểm KPI giảm dần
    function sortEmpList(deptKey, list){
      const order = CUSTOM_ORDER[deptKey];
      if (order){
        const idx = email => { const i = order.indexOf(email); return i === -1 ? 999 : i; };
        return list.slice().sort((a,b) => idx(a.email) - idx(b.email));
      }
      return list.slice().sort((a,b) => (b.total||0) - (a.total||0));
    }

    // ---------- Phân trang dùng chung cho mọi bảng ----------
    // size (tuỳ chọn): số dòng/trang riêng cho bảng này, mặc định dùng PAGE_SIZE chung.
    function registerTable(tableId, rowsData, colCount, size){
      PAGE_STATE[tableId] = { rowsData, colCount, page: 1, size: size || PAGE_SIZE };
    }

    function getVisibleRows(tableId){
      const q = document.getElementById('globalSearch').value.trim().toLowerCase();
      const state = PAGE_STATE[tableId];
      if (!state) return [];
      if (!q) return state.rowsData;
      return state.rowsData.filter(r => r.name.includes(q) || r.email.includes(q));
    }

    function renderTableBody(tableId){
      const state = PAGE_STATE[tableId];
      if (!state) return;
      const size = state.size || PAGE_SIZE;
      const visible = getVisibleRows(tableId);
      const totalPages = Math.max(1, Math.ceil(visible.length / size));
      if (state.page > totalPages) state.page = totalPages;
      if (state.page < 1) state.page = 1;
      const start = (state.page - 1) * size;
      const pageRows = visible.slice(start, start + size);
      const tbody = document.getElementById('tbody-' + tableId);
      if (tbody){
        tbody.innerHTML = pageRows.length
          ? pageRows.map(r => r.html).join('')
          : `<tr><td colspan="${state.colCount}" class="empty">Không có dữ liệu phù hợp</td></tr>`;
      }
      renderPagination(tableId, visible.length, totalPages);
    }

    function renderPagination(tableId, totalRows, totalPages){
      const el = document.getElementById('pag-' + tableId);
      if (!el) return;
      const state = PAGE_STATE[tableId];
      const size = state.size || PAGE_SIZE;
      if (totalRows <= size){ el.innerHTML = ''; return; }
      let html = `<span style="font-size:11px;color:var(--muted);margin-right:auto;">${totalRows} nhân viên</span>`;
      html += `<button class="pg-btn" data-table="${tableId}" data-action="prev" ${state.page===1?'disabled':''}>‹</button>`;
      for (let p = 1; p <= totalPages; p++){
        html += `<button class="pg-btn ${p===state.page?'active':''}" data-table="${tableId}" data-action="goto" data-page="${p}">${p}</button>`;
      }
      html += `<button class="pg-btn" data-table="${tableId}" data-action="next" ${state.page===totalPages?'disabled':''}>›</button>`;
      el.innerHTML = html;
      el.querySelectorAll('.pg-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tid = btn.dataset.table;
          const st = PAGE_STATE[tid];
          const sz = st.size || PAGE_SIZE;
          const visible = getVisibleRows(tid);
          const tp = Math.max(1, Math.ceil(visible.length / sz));
          if (btn.dataset.action === 'prev') st.page = Math.max(1, st.page - 1);
          else if (btn.dataset.action === 'next') st.page = Math.min(tp, st.page + 1);
          else st.page = parseInt(btn.dataset.page, 10);
          renderTableBody(tid);
        });
      });
    }

    // Bảng tổng KPI (điểm theo hạng mục) cho 1 nhóm (bộ phận + loại) — trả về HTML khung (tbody rỗng, chờ phân trang đổ dữ liệu)

      }).join('');
      const totalHeadCols = isController
        ? `<th class="total-col">Tổng điểm (không tính Kiểm kho)</th><th class="total-col">Tổng điểm (tính Kiểm kho)</th>`
        : `<th class="total-col">Tổng điểm</th>`;

      const rowsData = grp.map(e => {
        const detail = detailAll[e.email] || {};
        const cells = shown.map(cat => {
          const isCounted = counted.has(cat);
          const v = detail[cat] || 0;
          return `<td class="${isCounted ? '' : 'ref-col'}">${fmtNum(v)}</td>`;
        }).join('');
        const totalCells = isController
          ? `<td class="total-col">${fmtNum(e.total)}</td><td class="total-col">${fmtNum((e.total||0) + (detail['Kiểm kho']||0))}</td>`

        return { html, name: e.name.toLowerCase(), email: e.email.toLowerCase() };
      });

      const sums = shown.map(cat => grp.reduce((s,e) => s + ((detailAll[e.email]||{})[cat] || 0), 0));

      const footerCells = sums.map(s => `<td>${fmtNum(s)}</td>`).join('');

      const totalWd = grp.reduce((s,e) => s + ((wd[e.email]||{}).ngay_cong || 0), 0);
      const totalPts = grp.reduce((s,e) => s + (e.total||0), 0);
      const colCount = type ? 3 : 4;
      const theadTypeCol = type ? '' : '<th>Loại</th>';
      const footerTypeCol = type ? '' : '<td></td>';

      registerTable(tableId, rowsData, colCount, pageSize);

      return `
      <div class="subsection">
        <h3>Ngày công &amp; Tổng điểm KPI${titleBadge}</h3>
        <div class="panel table-scroll">
          <table>
            <thead><tr><th>Nhân viên</th>${theadTypeCol}<th>Ngày công</th><th class="total-col">Tổng điểm</th></tr></thead>
            <tbody id="tbody-${tableId}"></tbody>
            <tfoot><tr><td>Tổng cộng (${grp.length} NV)</td>${footerTypeCol}<td>${fmtNum(totalWd)}</td><td class="total-col">${fmtNum(totalPts)}</td></tr></tfoot>
          </table>
          <div class="pagination" id="pag-${tableId}"></div>
        </div>
      </div>`;
    }

    function renderTabBar(){
      const tabBar = document.getElementById('tabBar');
      tabBar.innerHTML = DEPT_ORDER.map(deptKey => {
        const cfg = DEPT_CONFIG[deptKey];
        const count = getDeptEmployees(deptKey).length;
        return `<button class="tab-btn${deptKey===activeTab?' active':''}" data-dept="${deptKey}">
          ${cfg.label}<span class="tab-count">(${count})</span>
        </button>`;
      }).join('');
      tabBar.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeTab = btn.dataset.dept;
          renderTabBar();
          showActiveTab();
        });
      });
    }

    function showActiveTab(){
      document.querySelectorAll('.dept-section').forEach(sec => {
        sec.classList.toggle('active', sec.dataset.dept === activeTab);
      });
    }

    // Render lại nội dung (bảng KPI + bảng ngày công) của 1 bộ phận theo bộ lọc Loại hiện tại
    function renderDeptContent(deptKey){
      const cfg = DEPT_CONFIG[deptKey];
      const employees = getDeptEmployees(deptKey);
      const filter = deptTypeFilter[deptKey];
      const filtered = filter === 'all' ? employees : employees.filter(e => e.type === filter);

      const contentEl = document.getElementById('dept-content-' + deptKey);
      if (!contentEl) return;

      if (!filtered.length){
        contentEl.innerHTML = `<div class="empty">Không có nhân viên phù hợp bộ lọc</div>`;
        return;
      }

      // Bộ phận Pack & Pick: hiển thị Bảng tổng KPI dạng nhiều bảng nhỏ xếp theo hàng (15 NV/bảng, có STT), không phân trang.
      // Các bộ phận khác: giữ nguyên bảng có phân trang như cũ.
      const kpiBuilder = (deptKey === 'Packer' || deptKey === 'Picker') ? buildKpiTableMultiple : buildKpiTable;
      let kpiTables = '';
      if (filter === 'all' || filter === 'Chính thức') kpiTables += kpiBuilder(deptKey, cfg, 'Chính thức', filtered);
      if (filter === 'all' || filter === 'Thời vụ') kpiTables += kpiBuilder(deptKey, cfg, 'Thời vụ', filtered);

      // Bộ phận Pack: bảng Ngày công & Tổng điểm KPI chỉ giữ Chính thức (bỏ Thời vụ).
      // Bộ phận Pick: giới hạn 15 NV/bảng (đủ chứa hết trong 1 bảng, không cần phân trang).
      // Các bộ phận khác: giữ nguyên 1 bảng gộp như cũ.
      let wdTable = '';
      if (deptKey === 'Packer'){
        if (filter === 'all' || filter === 'Chính thức') wdTable += buildWorkdayTable(deptKey, filtered.filter(e => e.type === 'Chính thức'), 'Chính thức');
      } else if (deptKey === 'Picker'){
        wdTable = buildWorkdayTable(deptKey, filtered, null, MULTI_PAGE_SIZE);
      } else {
        wdTable = buildWorkdayTable(deptKey, filtered);
      }

      contentEl.innerHTML = kpiTables + wdTable;

      // đổ dữ liệu trang đầu cho các bảng vừa đăng ký thuộc bộ phận này
      Object.keys(PAGE_STATE).forEach(tid => {
        if (tid.includes(deptKey)){
          renderTableBody(tid);
        }
      });
    }

    function renderDepartments(){
      const container = document.getElementById('deptContainer');
      PAGE_STATE = {};
      let html = '';
      DEPT_ORDER.forEach(deptKey => {
        const cfg = DEPT_CONFIG[deptKey];
        const employees = getDeptEmployees(deptKey);
        const filterBtns = ['all','Chính thức','Thời vụ'].map(t => {
          const label = t === 'all' ? 'Tất cả' : t;
          const active = deptTypeFilter[deptKey] === t;
          return `<button class="${active?'active':''}" data-dept="${deptKey}" data-type="${t}">${label}</button>`;
        }).join('');
        html += `
        <div class="dept-section" data-dept="${deptKey}">
          <div class="dept-header-row">
            <div class="dept-title">${cfg.label} <span class="dept-count">(${employees.length} nhân viên)</span></div>
            <div class="type-filter">${filterBtns}</div>
          </div>
          <div id="dept-content-${deptKey}"></div>
        </div>`;
      });
      container.innerHTML = html;

      document.querySelectorAll('.type-filter button').forEach(btn => {
        btn.addEventListener('click', () => {
          const deptKey = btn.dataset.dept;
          deptTypeFilter[deptKey] = btn.dataset.type;
          document.querySelectorAll(`.type-filter button[data-dept="${deptKey}"]`).forEach(b => {
            b.classList.toggle('active', b.dataset.type === btn.dataset.type);
          });
          renderDeptContent(deptKey);
        });
      });

      DEPT_ORDER.forEach(deptKey => renderDeptContent(deptKey));
      showActiveTab();
    }

    function applySearch(){
      Object.keys(PAGE_STATE).forEach(tid => {
        PAGE_STATE[tid].page = 1;
        renderTableBody(tid);
      });
    }

    document.getElementById('globalSearch').addEventListener('input', applySearch);

    function renderAll(){
      renderMeta();
      renderTabBar();
      renderDepartments();
    }

    renderAll();
</script>
</body>
</html>
